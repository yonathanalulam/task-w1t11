name: regops-portal-${USER:-local}

services:
  bootstrap:
    image: bash:5.2
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - runtime_state:/workspace/runtime
      - runtime_secrets:/run/secrets/field-encryption
    command: ["bash", "-lc", "bash /workspace/scripts/dev/bootstrap_runtime.sh"]
    restart: "no"

  db:
    build:
      context: .
      dockerfile: infra/mysql/Dockerfile
    volumes:
      - ./:/workspace
      - runtime_state:/workspace/runtime
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
      - backend_vendor:/workspace/backend/vendor
      - ./scripts:/workspace/scripts:ro
      - ./init_db.sh:/workspace/init_db.sh:ro
      - runtime_state:/workspace/runtime
      - runtime_secrets:/run/secrets/field-encryption
    command: ["bash", "-lc", "bash /workspace/scripts/dev/api_start.sh"]
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r 'exit(@file_get_contents(\"http://127.0.0.1:8000/api/health/live\") !== false ? 0 : 1);'",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
      - backend_vendor:/workspace/backend/vendor
      - ./scripts:/workspace/scripts:ro
      - ./init_db.sh:/workspace/init_db.sh:ro
      - runtime_state:/workspace/runtime
      - runtime_secrets:/run/secrets/field-encryption
    command: ["bash", "-lc", "bash /workspace/scripts/dev/worker_start.sh"]

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
      - runtime_state:/workspace/runtime:ro
    command: ["bash", "-lc", "bash /workspace/scripts/dev/web_start.sh"]
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-4280}:5173"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  e2e:
    profiles: ["test"]
    build:
      context: .
      dockerfile: e2e/Dockerfile
    depends_on:
      web:
        condition: service_started
    working_dir: /workspace/frontend
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
      - runtime_state:/workspace/runtime:ro
    environment:
      PLAYWRIGHT_BASE_URL: http://web:5173
    command: ["bash", "-lc", "if [ ! -x /workspace/frontend/node_modules/.bin/playwright ] || [ ! -d /workspace/frontend/node_modules/happy-dom ]; then mkdir -p /workspace/frontend/node_modules && rm -rf /workspace/frontend/node_modules/* && cp -R /opt/frontend-seed/node_modules/. /workspace/frontend/node_modules/; fi; npm run test:e2e"]

volumes:
  db_data:
  runtime_state:
  runtime_secrets:
  backend_vendor:
  frontend_node_modules:
